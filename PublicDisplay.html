<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Doorprize Display</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════
   ROOT & RESET
══════════════════════════════════════════════ */
:root {
  --bg-a:       #071a52;
  --bg-b:       #0d4fa8;
  --bg-c:       #0a3580;
  --accent:     #00c6ff;
  --accent2:    #5ee7ff;
  --gold:       #FFD700;
  --white:      #ffffff;
  --dim:        rgba(255,255,255,.7);
  --card-bg:    rgba(255,255,255,.10);
  --card-bdr:   rgba(255,255,255,.22);

  /* Skala font global — diubah oleh JS sesuai viewport */
  --scale: 1;
  --fs-xs:    calc(.6rem  * var(--scale));
  --fs-sm:    calc(.75rem * var(--scale));
  --fs-base:  calc(.9rem  * var(--scale));
  --fs-md:    calc(1.1rem * var(--scale));
  --fs-lg:    calc(1.4rem * var(--scale));
  --fs-xl:    calc(2rem   * var(--scale));
  --fs-2xl:   calc(3rem   * var(--scale));

  --gap:      calc(10px   * var(--scale));
  --pad:      calc(18px   * var(--scale));
  --radius:   calc(14px   * var(--scale));
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  /* Izinkan scroll jika konten melebihi layar (HP potrait banyak pemenang) */
  height: 100%;
}

body {
  font-family: 'Open Sans', sans-serif;
  background:
    radial-gradient(ellipse at 20% 0%,   rgba(0,198,255,.12) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 100%, rgba(0,80,200,.2)   0%, transparent 55%),
    linear-gradient(160deg, var(--bg-a) 0%, var(--bg-b) 50%, var(--bg-c) 100%);
  background-attachment: fixed;
  color: var(--white);
  min-height: 100%;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* ══════════════════════════════════════════════
   PARTICLES — hanya desktop agar hemat CPU HP
══════════════════════════════════════════════ */
#particles {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  overflow: hidden; display: none;
}
@media (min-width: 768px) { #particles { display: block; } }
.particle {
  position: absolute; border-radius: 50%;
  background: rgba(255,255,255,.12);
  animation: floatUp linear infinite;
}
@keyframes floatUp {
  0%   { transform: translateY(0) scale(1); opacity: 0; }
  10%  { opacity: .8; }
  90%  { opacity: .3; }
  100% { transform: translateY(-110vh) scale(.3); opacity: 0; }
}

/* ══════════════════════════════════════════════
   LAYOUT UTAMA
══════════════════════════════════════════════ */
#app {
  position: relative; z-index: 1;
  flex: 1;
  display: flex; flex-direction: column;
  min-height: 100dvh;
}

/* ══════════════════════════════════════════════
   HEADER
══════════════════════════════════════════════ */
header {
  flex-shrink: 0;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: var(--gap);
  padding: calc(var(--pad) * .7) var(--pad);
  background: rgba(0,0,0,.28);
  border-bottom: 1px solid rgba(255,255,255,.1);
  backdrop-filter: blur(8px);
}

.hdr-left {
  display: flex; flex-direction: column; gap: 2px;
  font-size: var(--fs-sm); color: var(--dim);
  min-width: 0;
}
.hdr-left b { color: var(--white); font-size: var(--fs-base); }

.hdr-center {
  text-align: center;
  font-family: 'Montserrat', sans-serif;
  font-size: var(--fs-2xl);
  font-weight: 900; letter-spacing: .07em;
  color: var(--white);
  text-shadow: 0 0 50px rgba(0,198,255,.7), 0 3px 10px rgba(0,0,0,.6);
  text-transform: uppercase;
  line-height: 1; white-space: nowrap;
}

.hdr-right {
  display: flex; flex-direction: column; align-items: flex-end; gap: 2px;
  font-size: var(--fs-sm); min-width: 0;
}
.hdr-right .logo-nm {
  font-family: 'Montserrat', sans-serif;
  font-weight: 800; font-size: var(--fs-md);
  color: var(--white); white-space: nowrap;
}
.hdr-right .logo-sub {
  font-size: var(--fs-xs); color: var(--accent2);
  letter-spacing: .05em; white-space: nowrap;
}

/* Header responsive — di layar sempit susun vertikal */
@media (max-width: 540px) {
  header {
    grid-template-columns: 1fr;
    grid-template-rows: auto auto auto;
    text-align: center;
  }
  .hdr-left  { align-items: center; }
  .hdr-right { align-items: center; }
}

/* ══════════════════════════════════════════════
   TICKER
══════════════════════════════════════════════ */
.ticker-bar {
  flex-shrink: 0;
  overflow: hidden;
  background: rgba(0,198,255,.12);
  border-bottom: 1px solid rgba(0,198,255,.18);
  padding: 5px 0;
}
.ticker-inner {
  display: inline-block; white-space: nowrap;
  font-size: var(--fs-sm); font-weight: 600;
  color: var(--accent2); letter-spacing: .03em;
  animation: ticker 32s linear infinite;
}
@keyframes ticker { from{transform:translateX(100vw)} to{transform:translateX(-100%)} }

/* ══════════════════════════════════════════════
   CONTENT AREA
══════════════════════════════════════════════ */
.content {
  flex: 1;
  display: flex; flex-direction: column;
  padding: var(--gap) var(--pad) calc(var(--gap) * .8);
  gap: var(--gap);
}

/* ══════════════════════════════════════════════
   STATS BAR
══════════════════════════════════════════════ */
.stats-bar {
  display: flex; flex-wrap: wrap;
  gap: calc(var(--gap) * .7);
  justify-content: center; flex-shrink: 0;
}
.stat-pill {
  display: flex; align-items: center; gap: 8px;
  background: rgba(0,0,0,.25);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 999px;
  padding: 4px calc(var(--pad) * .7);
}
.sp-num {
  font-family: 'Montserrat', sans-serif;
  font-weight: 800; font-size: var(--fs-lg);
  color: var(--gold); line-height: 1;
}
.sp-lbl {
  font-size: var(--fs-xs); color: var(--dim);
  text-transform: uppercase; letter-spacing: .04em;
  line-height: 1.3;
}

/* ══════════════════════════════════════════════
   SECTION LABEL
══════════════════════════════════════════════ */
.section-label {
  text-align: center; flex-shrink: 0;
  font-family: 'Montserrat', sans-serif;
  font-size: var(--fs-sm); font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--accent2); opacity: .85;
}

/* ══════════════════════════════════════════════
   WINNERS GRID — KUNCI RESPONSIVITAS
   auto-fill + minmax: kolom otomatis menyesuaikan
   lebar layar tanpa perlu breakpoint manual
══════════════════════════════════════════════ */
.winners-grid {
  flex: 1;
  display: grid;
  /* 
    Tiap kartu minimal 220px, maks 1fr.
    Pada layar 360px → 1 kolom
    Pada layar 600px → 2 kolom
    Pada layar 900px → 3 kolom
    Pada layar 1400px → 4+ kolom
    Semua otomatis tanpa media query!
  */
  grid-template-columns: repeat(auto-fill, minmax(min(220px, 100%), 1fr));
  gap: var(--gap);
  align-content: start;
  /* Izinkan scroll jika banyak pemenang */
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,.2) transparent;
}
.winners-grid::-webkit-scrollbar { width: 4px; }
.winners-grid::-webkit-scrollbar-track { background: transparent; }
.winners-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,.2); border-radius: 2px; }

/* Override kolom saat jumlah pemenang sedikit
   agar tidak melar terlalu lebar */
.winners-grid[data-count="1"] {
  grid-template-columns: minmax(min(280px,100%), 360px);
  justify-content: center;
}
.winners-grid[data-count="2"] {
  grid-template-columns: repeat(2, minmax(min(220px,100%), 340px));
  justify-content: center;
}
.winners-grid[data-count="3"],
.winners-grid[data-count="4"] {
  grid-template-columns: repeat(auto-fill, minmax(min(200px,100%), 1fr));
}

/* ══════════════════════════════════════════════
   WINNER CARD
══════════════════════════════════════════════ */
.winner-card {
  background: var(--card-bg);
  border: 1.5px solid var(--card-bdr);
  border-radius: var(--radius);
  padding: calc(var(--pad) * .8) calc(var(--pad) * .7) var(--pad);
  display: flex; flex-direction: column; align-items: center;
  text-align: center;
  backdrop-filter: blur(8px);
  position: relative; overflow: hidden;
  animation: cardIn .45s ease both;
  transition: transform .25s, background .25s, box-shadow .25s;
  /* Pastikan kartu tidak terlalu pendek */
  min-height: calc(120px * var(--scale));
}

/* Garis atas kartu */
.winner-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  opacity: .75;
}

/* Cahaya di sudut */
.winner-card::after {
  content: '';
  position: absolute; top: -30%; right: -20%;
  width: 60%; padding-top: 60%;
  background: radial-gradient(circle, rgba(0,198,255,.08) 0%, transparent 70%);
  pointer-events: none;
}

@media (hover: hover) {
  .winner-card:hover {
    transform: translateY(-4px);
    background: rgba(255,255,255,.16);
    box-shadow: 0 8px 32px rgba(0,0,0,.25);
  }
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(16px) scale(.96); }
  to   { opacity: 1; transform: none; }
}

.winner-card.flash-new {
  animation: cardIn .45s ease both, flashNew 2s ease .5s;
}
@keyframes flashNew {
  0%,100% { border-color: var(--card-bdr); box-shadow: none; }
  40%,60% { border-color: var(--gold); box-shadow: 0 0 28px rgba(255,215,0,.35); }
}

/* Konten kartu */
.card-hadiah {
  font-family: 'Montserrat', sans-serif;
  font-size: var(--fs-sm);
  font-weight: 700; color: var(--accent2);
  letter-spacing: .05em; text-transform: uppercase;
  line-height: 1.35; margin-bottom: calc(var(--gap) * .6);
  /* Batasi 2 baris agar kartu seragam */
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-divider {
  width: 36px; height: 1.5px; flex-shrink: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.38), transparent);
  margin-bottom: calc(var(--gap) * .6);
}

.card-nama {
  font-family: 'Montserrat', sans-serif;
  font-size: var(--fs-lg);
  font-weight: 800; color: var(--white);
  line-height: 1.2; margin-bottom: 4px;
  /* Nama panjang tetap muat */
  word-break: break-word;
}

.card-kk {
  font-family: 'Courier New', monospace;
  font-size: var(--fs-xs);
  color: rgba(255,255,255,.5);
  margin-bottom: 3px; word-break: break-all;
}

.card-kel {
  font-size: var(--fs-xs); color: var(--dim);
  margin-bottom: 3px;
}

.card-status { margin-top: calc(var(--gap) * .6); flex-shrink: 0; }
.badge-hadir {
  display: inline-block; padding: 2px 10px; border-radius: 999px;
  font-size: var(--fs-xs); font-weight: 700;
  background: rgba(34,197,94,.18); border: 1px solid rgba(34,197,94,.4);
  color: #86efac;
}
.badge-menunggu {
  display: inline-block; padding: 2px 10px; border-radius: 999px;
  font-size: var(--fs-xs); font-weight: 700;
  background: rgba(234,179,8,.15); border: 1px solid rgba(234,179,8,.3);
  color: #fde68a;
}

/* ══════════════════════════════════════════════
   EMPTY STATE
══════════════════════════════════════════════ */
.empty-state {
  grid-column: 1 / -1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px; padding: 60px 20px;
  opacity: .55;
}
.empty-icon { font-size: clamp(3rem, 8vw, 5rem); animation: pulse 3s ease-in-out infinite; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }
.empty-txt  { font-family:'Montserrat',sans-serif; font-size: var(--fs-md); font-weight: 700; color: var(--dim); }
.empty-sub  { font-size: var(--fs-sm); color: rgba(255,255,255,.4); text-align: center; }

/* ══════════════════════════════════════════════
   FOOTER
══════════════════════════════════════════════ */
footer {
  flex-shrink: 0;
  text-align: center;
  padding: 6px var(--pad);
  font-size: var(--fs-xs);
  color: rgba(255,255,255,.38);
  border-top: 1px solid rgba(255,255,255,.07);
  font-style: italic; letter-spacing: .05em;
}

/* ══════════════════════════════════════════════
   LOADING SCREEN
══════════════════════════════════════════════ */
#loading {
  position: fixed; inset: 0; z-index: 999;
  background: linear-gradient(160deg, var(--bg-a), var(--bg-c));
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 18px;
}
.ld-ring {
  width: 54px; height: 54px;
  border: 3px solid rgba(255,255,255,.12);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.ld-text {
  font-family: 'Montserrat', sans-serif;
  font-size: .88rem; font-weight: 700;
  color: var(--accent2); letter-spacing: .1em;
}
</style>
</head>
<body>

<div id="particles"></div>

<!-- LOADING -->
<div id="loading">
  <div class="ld-ring"></div>
  <div class="ld-text">MEMUAT DATA...</div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">

  <header>
    <div class="hdr-left">
      <span id="hdr-panitia">Panitia Doorprize</span>
      <b id="hdr-tema"></b>
    </div>
    <div class="hdr-center" id="hdr-title">DOORPRIZE</div>
    <div class="hdr-right">
      <span class="logo-nm"  id="hdr-org"></span>
      <span class="logo-sub" id="hdr-tagline2"></span>
    </div>
  </header>

  <div class="ticker-bar">
    <span class="ticker-inner" id="ticker">
      ★ Selamat Datang ★ Selamat Menikmati Acara ★ Barakallahu Fiikum ★
    </span>
  </div>

  <div class="content">

    <div class="stats-bar">
      <div class="stat-pill">
        <div class="sp-num" id="st-total">0</div>
        <div class="sp-lbl">Total<br>Peserta</div>
      </div>
      <div class="stat-pill">
        <div class="sp-num" id="st-sisa">0</div>
        <div class="sp-lbl">Sisa<br>Pool</div>
      </div>
      <div class="stat-pill">
        <div class="sp-num" id="st-menang">0</div>
        <div class="sp-lbl">Sudah<br>Menang</div>
      </div>
      <div class="stat-pill">
        <div class="sp-num" id="st-hadir">0</div>
        <div class="sp-lbl">Hadir<br>Konfirmasi</div>
      </div>
    </div>

    <div class="section-label" id="section-label">🏆 DAFTAR PEMENANG</div>

    <div class="winners-grid" id="winners-grid">
      <div class="empty-state">
        <div class="empty-icon">🎰</div>
        <div class="empty-txt">Pengundian Belum Dimulai</div>
        <div class="empty-sub">Pemenang akan tampil di sini secara otomatis</div>
      </div>
    </div>

  </div><!-- .content -->

  <footer id="footer-text">Selamat menikmati acara</footer>

</div><!-- #app -->

<script>
// ══════════════════════════════════════════════
//  ⚠️ KONFIGURASI WAJIB
// ══════════════════════════════════════════════
const GAS_URL = 'GANTI_DENGAN_URL_DEPLOY_APPS_SCRIPT_ANDA';

const CFG = {
  refreshMs:    10000,   // refresh data tiap 10 detik
  showNoKK:     true,    // override show_kk_publik dari settings jika perlu
  maxColDesktop: 3,      // kolom maksimal di desktop (3 atau 4)
};

// ══════════════════════════════════════════════
//  RESPONSIVE SCALE
//  Menghitung --scale agar semua elemen
//  proporsional di SEMUA ukuran layar
// ══════════════════════════════════════════════
function updateScale() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  // Referensi desain: 1366×768 (laptop standar)
  const scaleW = w  / 1366;
  const scaleH = h  / 768;
  // Ambil yang lebih kecil agar tidak overflow salah satu arah
  const scale  = Math.min(scaleW, scaleH);
  // Clamp: jangan terlalu kecil (HP) atau terlalu besar (4K TV)
  const clamped = Math.max(0.45, Math.min(scale, 2.2));
  document.documentElement.style.setProperty('--scale', clamped);
}
updateScale();
window.addEventListener('resize', updateScale);

// ══════════════════════════════════════════════
//  PARTICLES
// ══════════════════════════════════════════════
(function(){
  const box = document.getElementById('particles');
  for(let i = 0; i < 25; i++){
    const el = document.createElement('div');
    el.className = 'particle';
    const s = 3 + Math.random() * 7;
    el.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;bottom:-${s}px;animation-duration:${9+Math.random()*14}s;animation-delay:${Math.random()*12}s;`;
    box.appendChild(el);
  }
})();

// ══════════════════════════════════════════════
//  API
// ══════════════════════════════════════════════
async function gasGet(fn, param=null){
  const p = param ? encodeURIComponent(JSON.stringify(param)) : '';
  const res = await fetch(`${GAS_URL}?fn=${fn}${p?'&p='+p:''}`);
  return res.json();
}

// ══════════════════════════════════════════════
//  FORMAT
// ══════════════════════════════════════════════
const fmtKK  = kk => String(kk).replace(/\D/g,'').replace(/(\d{4})/g,'$1 ').trim();
const maskKK = kk => { const d=String(kk).replace(/\D/g,''); return d.slice(0,4)+' •••• •••• '+d.slice(-4); };

// ══════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════
let prevIds = new Set();

function hitungKolom(n) {
  if(n <= 0) return CFG.maxColDesktop;
  // data-count dipakai CSS untuk kartu sedikit
  return n;
}

function renderGrid(pemenang, showKK) {
  const grid  = document.getElementById('winners-grid');
  const label = document.getElementById('section-label');

  if(!pemenang || !pemenang.length){
    grid.removeAttribute('data-count');
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🎰</div>
        <div class="empty-txt">Pengundian Belum Dimulai</div>
        <div class="empty-sub">Pemenang akan tampil di sini secara otomatis</div>
      </div>`;
    label.textContent = '🏆 DAFTAR PEMENANG';
    return;
  }

  label.textContent = `🏆 DAFTAR PEMENANG — ${pemenang.length} ORANG`;

  // Pasang data-count untuk override CSS kolom pada jumlah kecil
  const cnt = pemenang.length;
  if(cnt <= 4) grid.setAttribute('data-count', cnt);
  else         grid.removeAttribute('data-count');

  grid.innerHTML = pemenang.map((p, i) => {
    const isNew    = !prevIds.has(String(p.noKK));
    const kkTxt    = showKK ? fmtKK(p.noKK) : maskKK(p.noKK);
    const badgeTxt = p.konfirmasi === 'Hadir'
      ? `<span class="badge-hadir">✓ Hadir</span>`
      : `<span class="badge-menunggu">⏳ Menunggu</span>`;

    return `
      <div class="winner-card ${isNew?'flash-new':''}" style="animation-delay:${Math.min(i*.06,.5)}s">
        <div class="card-hadiah">${escHtml(p.hadiah)}</div>
        <div class="card-divider"></div>
        <div class="card-nama">${escHtml(p.nama||'—')}</div>
        <div class="card-kk">${kkTxt}</div>
        ${p.kelurahan?`<div class="card-kel">📍 ${escHtml(p.kelurahan)}</div>`:''}
        <div class="card-status">${badgeTxt}</div>
      </div>`;
  }).join('');

  prevIds = new Set(pemenang.map(p => String(p.noKK)));
}

function escHtml(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════════
//  REFRESH
// ══════════════════════════════════════════════
async function refresh(){
  try {
    const [sR, stR, pR] = await Promise.all([
      gasGet('getPublicSettings'),
      gasGet('getStatistik'),
      gasGet('getPemenangPublik'),
    ]);

    const s    = sR.data || {};
    const showKK = s.show_kk_publik !== 'tidak';

    // Header
    document.getElementById('hdr-title').textContent    = (s.nama_acara||'DOORPRIZE').toUpperCase();
    document.getElementById('hdr-panitia').textContent  = s.nama_panitia||'';
    document.getElementById('hdr-tema').textContent     = s.tema||'';
    document.getElementById('hdr-org').textContent      = s.nama_organisasi||'';
    document.getElementById('hdr-tagline2').textContent = s.lokasi||'';
    document.title = (s.nama_acara||'Doorprize')+' — Display';

    // Ticker
    if(s.ticker_text){
      document.getElementById('ticker').textContent =
        s.ticker_text.split('|').map(t=>'★ '+t.trim()).join('   ');
    }

    // Footer
    if(s.tema) document.getElementById('footer-text').textContent = s.tema;

    // Stats
    if(stR.success){
      document.getElementById('st-total').textContent  = stR.totalPeserta;
      document.getElementById('st-sisa').textContent   = stR.sisaPool;
      document.getElementById('st-menang').textContent = stR.totalMenang;
      document.getElementById('st-hadir').textContent  = stR.hadir;
    }

    // Grid pemenang (filter yang tidak hadir)
    const list = (pR.data||[]).filter(p=>p.konfirmasi!=='Tidak Hadir');
    renderGrid(list, showKK);

  } catch(e) {
    console.warn('Refresh error:', e);
  }
}

window.onload = async () => {
  if(GAS_URL === 'https://script.google.com/macros/s/AKfycbyqxGPjMbeap_Ua5WVf-z5HZ2m8G1iwia-Au1u7KEa3LfcFX_oUfO0lOwF0zZuJO6kx/exec'){

        <div style="font-size:3rem;margin-bottom:16px">⚙️</div>
        <h2 style="color:#00c6ff;margin-bottom:12px">Konfigurasi Diperlukan</h2>
        <p style="color:rgba(255,255,255,.65);max-width:380px;line-height:1.6">
          Buka file <code style="color:#FFD700">PublicDisplay.html</code><br>
          dan ganti nilai <code style="color:#FFD700">GAS_URL</code><br>
          dengan URL deploy Google Apps Script Anda.
        </p>
      </div>`;
    return;

  await refresh();
  document.getElementById('loading').style.display = 'none';

};
