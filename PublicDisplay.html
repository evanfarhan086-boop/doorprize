<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Doorprize Display</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════
   ROOT — semua ukuran pakai clamp() murni CSS,
   tidak bergantung JS untuk scale.
   clamp(min, preferred, max)
   preferred pakai vw/vh sehingga otomatis
   mengikuti zoom Chrome.
══════════════════════════════════════════════ */
:root {
  --bg-a:    #071a52;
  --bg-b:    #0d4fa8;
  --bg-c:    #0a3580;
  --accent:  #00c6ff;
  --accent2: #5ee7ff;
  --gold:    #FFD700;
  --white:   #ffffff;
  --dim:     rgba(255,255,255,.72);

  --card-bg:  rgba(255,255,255,.10);
  --card-bdr: rgba(255,255,255,.22);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  /* Biarkan scroll agar konten tidak terpotong saat zoom in */
  min-height: 100%;
}

body {
  font-family: 'Open Sans', sans-serif;
  background:
    radial-gradient(ellipse at 15% 0%,   rgba(0,198,255,.10) 0%, transparent 50%),
    radial-gradient(ellipse at 85% 100%, rgba(0,80,200,.18)  0%, transparent 50%),
    linear-gradient(155deg, var(--bg-a) 0%, var(--bg-b) 50%, var(--bg-c) 100%);
  background-attachment: fixed;
  color: var(--white);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ══════ PARTICLES ══════ */
#particles { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.particle  { position:absolute; border-radius:50%; background:rgba(255,255,255,.12); animation:floatUp linear infinite; }
@keyframes floatUp {
  0%   { transform:translateY(0) scale(1);   opacity:0; }
  10%  { opacity:.8; }
  90%  { opacity:.3; }
  100% { transform:translateY(-110vh) scale(.3); opacity:0; }
}

/* ══════ APP WRAPPER ══════ */
#app {
  position:relative; z-index:1;
  flex:1; display:flex; flex-direction:column;
  min-height:100vh;
}

/* ══════════════════════════════════════════════
   HEADER
   Pakai flex-wrap sehingga saat zoom in / layar
   sempit, item turun ke baris baru — tidak terpotong.
══════════════════════════════════════════════ */
header {
  flex-shrink: 0;
  display: flex;
  flex-wrap: wrap;                  /* ← kunci: wrap saat sempit */
  align-items: center;
  justify-content: space-between;
  gap: clamp(6px, 1.2vw, 16px);
  padding: clamp(8px, 1.4vh, 18px) clamp(12px, 2.5vw, 36px);
  background: rgba(0,0,0,.28);
  border-bottom: 1px solid rgba(255,255,255,.1);
  backdrop-filter: blur(8px);
}

/* Sisi kiri — panitia & tema */
.hdr-left {
  display: flex; flex-direction: column; gap: 2px;
  min-width: 0; flex: 1 1 120px;   /* bisa menyusut sampai 120px */
}
.hdr-left .org {
  font-size: clamp(.6rem, 1.2vw, .88rem);
  color: var(--dim);
  /* Izinkan wrap, tidak nowrap */
  white-space: normal; word-break: break-word;
}
.hdr-left .tema {
  font-size: clamp(.62rem, 1.1vw, .82rem);
  color: var(--accent2); font-weight: 600;
  white-space: normal; word-break: break-word;
}

/* Judul tengah */
.hdr-center {
  flex: 0 1 auto;                   /* bisa menyusut, tidak dipaksa lebar */
  text-align: center;
  font-family: 'Montserrat', sans-serif;
  font-weight: 900;
  /* clamp: min 1.4rem, naik seiring vw, max 3.8rem */
  font-size: clamp(1.4rem, 4.5vw, 3.8rem);
  letter-spacing: .06em;
  color: var(--white);
  text-shadow: 0 0 50px rgba(0,198,255,.65), 0 3px 8px rgba(0,0,0,.55);
  text-transform: uppercase;
  line-height: 1.05;
  /* Izinkan wrap jika sangat sempit */
  word-break: break-word;
}

/* Sisi kanan — nama organisasi */
.hdr-right {
  display: flex; flex-direction: column; align-items: flex-end; gap: 2px;
  min-width: 0; flex: 1 1 120px; text-align: right;
}
.hdr-right .logo-nm {
  font-family: 'Montserrat', sans-serif;
  font-weight: 800;
  font-size: clamp(.65rem, 1.4vw, 1.05rem);
  color: var(--white);
  white-space: normal; word-break: break-word;
}
.hdr-right .logo-sub {
  font-size: clamp(.55rem, .9vw, .72rem);
  color: var(--accent2); letter-spacing: .05em;
}

/* ══════ TICKER ══════ */
.ticker-bar {
  flex-shrink:0; overflow:hidden;
  background:rgba(0,198,255,.11);
  border-bottom:1px solid rgba(0,198,255,.18);
  padding:4px 0;
}
.ticker-inner {
  display:inline-block; white-space:nowrap;
  font-size:clamp(.65rem, 1.1vw, .85rem);
  font-weight:600; color:var(--accent2); letter-spacing:.03em;
  animation:ticker 32s linear infinite;
}
@keyframes ticker { from{transform:translateX(100vw)} to{transform:translateX(-100%)} }

/* ══════ CONTENT ══════ */
.content {
  flex:1; display:flex; flex-direction:column;
  padding: clamp(8px,1.2vh,16px) clamp(10px,2vw,28px) clamp(6px,1vh,12px);
  gap: clamp(6px, 1vh, 12px);
}

/* ══════ STATS ══════ */
.stats-bar {
  display:flex; flex-wrap:wrap;
  gap:clamp(6px,.8vw,10px);
  justify-content:center; flex-shrink:0;
}
.stat-pill {
  display:flex; align-items:center; gap:8px;
  background:rgba(0,0,0,.25);
  border:1px solid rgba(255,255,255,.15);
  border-radius:999px;
  padding: clamp(3px,.4vh,6px) clamp(10px,1.5vw,20px);
}
.sp-num {
  font-family:'Montserrat',sans-serif; font-weight:800;
  font-size:clamp(.9rem, 2vw, 1.5rem);
  color:var(--gold); line-height:1;
}
.sp-lbl {
  font-size:clamp(.55rem,.85vw,.75rem);
  color:var(--dim); text-transform:uppercase;
  letter-spacing:.04em; line-height:1.3;
}

/* ══════ SECTION LABEL ══════ */
.section-label {
  text-align:center; flex-shrink:0;
  font-family:'Montserrat',sans-serif; font-weight:700;
  font-size:clamp(.6rem,1vw,.88rem);
  letter-spacing:.1em; text-transform:uppercase;
  color:var(--accent2); opacity:.85;
}

/* ══════════════════════════════════════════════
   WINNERS GRID
   auto-fill + minmax = jumlah kolom otomatis
   mengikuti lebar kontainer (termasuk saat zoom).
   Tidak perlu media query atau JS untuk kolom.
══════════════════════════════════════════════ */
.winners-grid {
  flex:1;
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(min(200px, 100%), 1fr));
  gap: clamp(6px, 1vw, 14px);
  align-content:start;
  overflow-y:auto;
  scrollbar-width:thin;
  scrollbar-color:rgba(255,255,255,.2) transparent;
}
.winners-grid::-webkit-scrollbar { width:4px; }
.winners-grid::-webkit-scrollbar-thumb { background:rgba(255,255,255,.2); border-radius:2px; }

/* Kartu sedikit: batasi lebar agar tidak melar */
.winners-grid[data-few="1"] {
  grid-template-columns: minmax(min(260px,100%), 340px);
  justify-content:center;
}
.winners-grid[data-few="2"] {
  grid-template-columns: repeat(2, minmax(min(200px,100%), 320px));
  justify-content:center;
}
.winners-grid[data-few="3"],
.winners-grid[data-few="4"] {
  grid-template-columns: repeat(auto-fill, minmax(min(190px,100%), 1fr));
}

/* ══════════════════════════════════════════════
   WINNER CARD
══════════════════════════════════════════════ */
.winner-card {
  background:var(--card-bg);
  border:1.5px solid var(--card-bdr);
  border-radius: clamp(8px,1vw,14px);
  padding: clamp(10px,1.2vh,18px) clamp(8px,.9vw,14px) clamp(12px,1.4vh,20px);
  display:flex; flex-direction:column; align-items:center;
  text-align:center;
  backdrop-filter:blur(8px);
  position:relative; overflow:hidden;
  animation:cardIn .45s ease both;
  transition:transform .25s, background .25s, box-shadow .25s;
}
.winner-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg, var(--accent), var(--accent2)); opacity:.75;
}
.winner-card::after {
  content:''; position:absolute; top:-30%; right:-20%;
  width:60%; padding-top:60%;
  background:radial-gradient(circle, rgba(0,198,255,.07) 0%, transparent 70%);
  pointer-events:none;
}
@media (hover:hover) {
  .winner-card:hover {
    transform:translateY(-4px);
    background:rgba(255,255,255,.16);
    box-shadow:0 8px 28px rgba(0,0,0,.22);
  }
}
@keyframes cardIn {
  from{opacity:0;transform:translateY(14px) scale(.96);}
  to{opacity:1;transform:none;}
}
.winner-card.flash-new {
  animation:cardIn .45s ease both, flashNew 2s ease .5s;
}
@keyframes flashNew {
  0%,100%{border-color:var(--card-bdr);box-shadow:none;}
  40%,60%{border-color:var(--gold);box-shadow:0 0 26px rgba(255,215,0,.35);}
}

/* Isi kartu — semua font pakai clamp + vw agar
   ikut zoom Chrome secara otomatis */
.card-hadiah {
  font-family:'Montserrat',sans-serif;
  font-size:clamp(.58rem,.95vw,.82rem);
  font-weight:700; color:var(--accent2);
  letter-spacing:.05em; text-transform:uppercase;
  line-height:1.35;
  margin-bottom:clamp(4px,.5vh,8px);
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
  overflow:hidden;
}
.card-divider {
  width:36px; height:1.5px; flex-shrink:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.38),transparent);
  margin-bottom:clamp(4px,.5vh,8px);
}
.card-nama {
  font-family:'Montserrat',sans-serif;
  font-size:clamp(.8rem,1.7vw,1.35rem);
  font-weight:800; color:var(--white);
  line-height:1.2; margin-bottom:3px;
  word-break:break-word;
}
.card-kk {
  font-family:'Courier New',monospace;
  font-size:clamp(.52rem,.8vw,.72rem);
  color:rgba(255,255,255,.5); margin-bottom:2px;
  word-break:break-all;
}
.card-kel {
  font-size:clamp(.52rem,.8vw,.7rem);
  color:var(--dim); margin-bottom:2px;
}
.card-status { margin-top:clamp(4px,.5vh,8px); flex-shrink:0; }
.badge-hadir {
  display:inline-block; padding:2px 10px; border-radius:999px;
  font-size:clamp(.5rem,.75vw,.68rem); font-weight:700;
  background:rgba(34,197,94,.18); border:1px solid rgba(34,197,94,.4); color:#86efac;
}
.badge-menunggu {
  display:inline-block; padding:2px 10px; border-radius:999px;
  font-size:clamp(.5rem,.75vw,.68rem); font-weight:700;
  background:rgba(234,179,8,.15); border:1px solid rgba(234,179,8,.3); color:#fde68a;
}

/* ══════ EMPTY STATE ══════ */
.empty-state {
  grid-column:1/-1;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:14px; padding:clamp(32px,8vh,80px) 20px; opacity:.55;
}
.empty-icon { font-size:clamp(2.5rem,6vw,5rem); animation:pulse 3s ease-in-out infinite; }
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.empty-txt  { font-family:'Montserrat',sans-serif; font-size:clamp(.9rem,1.8vw,1.2rem); font-weight:700; color:var(--dim); }
.empty-sub  { font-size:clamp(.7rem,1.2vw,.9rem); color:rgba(255,255,255,.4); text-align:center; }

/* ══════ FOOTER ══════ */
footer {
  flex-shrink:0; text-align:center;
  padding:clamp(4px,.6vh,8px) clamp(10px,2vw,24px);
  font-size:clamp(.55rem,.9vw,.75rem);
  color:rgba(255,255,255,.38);
  border-top:1px solid rgba(255,255,255,.07);
  font-style:italic; letter-spacing:.05em;
}

/* ══════ LOADING ══════ */
#loading {
  position:fixed; inset:0; z-index:999;
  background:linear-gradient(155deg,var(--bg-a),var(--bg-c));
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px;
}
.ld-ring {
  width:52px; height:52px;
  border:3px solid rgba(255,255,255,.12); border-top-color:var(--accent);
  border-radius:50%; animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-text {
  font-family:'Montserrat',sans-serif; font-size:.88rem; font-weight:700;
  color:var(--accent2); letter-spacing:.1em;
}
</style>
</head>
<body>

<div id="particles"></div>

<div id="loading">
  <div class="ld-ring"></div>
  <div class="ld-text">MEMUAT DATA...</div>
</div>

<div id="app" style="display:none">

  <header>
    <div class="hdr-left">
      <span class="org"  id="hdr-panitia">Panitia Doorprize</span>
      <span class="tema" id="hdr-tema"></span>
    </div>

    <div class="hdr-center" id="hdr-title">DOORPRIZE</div>

    <div class="hdr-right">
      <span class="logo-nm"  id="hdr-org"></span>
      <span class="logo-sub" id="hdr-lokasi"></span>
    </div>
  </header>

  <div class="ticker-bar">
    <span class="ticker-inner" id="ticker">
      ★ Selamat Datang ★ Selamat Menikmati Acara ★ Barakallahu Fiikum ★
    </span>
  </div>

  <div class="content">

    <div class="stats-bar">
      <div class="stat-pill">
        <div class="sp-num" id="st-total">0</div>
        <div class="sp-lbl">Total<br>Peserta</div>
      </div>
      <div class="stat-pill">
        <div class="sp-num" id="st-sisa">0</div>
        <div class="sp-lbl">Sisa<br>Pool</div>
      </div>
      <div class="stat-pill">
        <div class="sp-num" id="st-menang">0</div>
        <div class="sp-lbl">Sudah<br>Menang</div>
      </div>
      <div class="stat-pill">
        <div class="sp-num" id="st-hadir">0</div>
        <div class="sp-lbl">Hadir<br>Konfirmasi</div>
      </div>
    </div>

    <div class="section-label" id="section-label">🏆 DAFTAR PEMENANG</div>

    <div class="winners-grid" id="winners-grid">
      <div class="empty-state">
        <div class="empty-icon">🎰</div>
        <div class="empty-txt">Pengundian Belum Dimulai</div>
        <div class="empty-sub">Pemenang akan tampil di sini secara otomatis</div>
      </div>
    </div>

  </div>

  <footer id="footer-text">Selamat menikmati acara</footer>

</div>

<script>
// ══════════════════════════════════════════════
//  ⚠️ KONFIGURASI — GANTI URL INI
// ══════════════════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyqxGPjMbeap_Ua5WVf-z5HZ2m8G1iwia-Au1u7KEa3LfcFX_oUfO0lOwF0zZuJO6kx/exec';

const CFG = {
  refreshMs: 10000,  // refresh tiap 10 detik
};

// ══════════════════════════════════════════════
//  PARTICLES
// ══════════════════════════════════════════════
(function(){
  const box = document.getElementById('particles');
  // Hanya tampilkan di layar lebar
  if(window.innerWidth < 600) return;
  for(let i = 0; i < 22; i++){
    const el = document.createElement('div');
    el.className = 'particle';
    const s = 3 + Math.random() * 7;
    el.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;bottom:-${s}px;animation-duration:${9+Math.random()*14}s;animation-delay:${Math.random()*12}s;`;
    box.appendChild(el);
  }
})();

// ══════════════════════════════════════════════
//  API
// ══════════════════════════════════════════════
async function gasGet(fn, param=null){
  const p   = param ? encodeURIComponent(JSON.stringify(param)) : '';
  const res = await fetch(`${GAS_URL}?fn=${fn}${p?'&p='+p:''}`);
  return res.json();
}

// ══════════════════════════════════════════════
//  FORMAT
// ══════════════════════════════════════════════
const fmtKK  = kk => String(kk).replace(/\D/g,'').replace(/(\d{4})/g,'$1 ').trim();
const maskKK = kk => { const d=String(kk).replace(/\D/g,''); return d.slice(0,4)+' •••• •••• '+d.slice(-4); };
const esc    = s  => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// ══════════════════════════════════════════════
//  RENDER GRID
// ══════════════════════════════════════════════
let prevIds = new Set();

function renderGrid(list, showKK){
  const grid  = document.getElementById('winners-grid');
  const label = document.getElementById('section-label');

  if(!list || !list.length){
    grid.removeAttribute('data-few');
    label.textContent = '🏆 DAFTAR PEMENANG';
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🎰</div>
        <div class="empty-txt">Pengundian Belum Dimulai</div>
        <div class="empty-sub">Pemenang akan tampil di sini secara otomatis</div>
      </div>`;
    return;
  }

  label.textContent = `🏆 DAFTAR PEMENANG — ${list.length} ORANG`;

  // data-few untuk CSS override kolom saat pemenang sedikit
  if(list.length <= 4) grid.setAttribute('data-few', list.length);
  else                 grid.removeAttribute('data-few');

  grid.innerHTML = list.map((p, i) => {
    const isNew   = !prevIds.has(String(p.noKK));
    const kkTxt   = showKK ? fmtKK(p.noKK) : maskKK(p.noKK);
    const badge   = p.konfirmasi === 'Hadir'
      ? `<span class="badge-hadir">✓ Hadir</span>`
      : `<span class="badge-menunggu">⏳ Menunggu</span>`;

    return `
      <div class="winner-card ${isNew?'flash-new':''}"
           style="animation-delay:${Math.min(i * .06, .5)}s">
        <div class="card-hadiah">${esc(p.hadiah)}</div>
        <div class="card-divider"></div>
        <div class="card-nama">${esc(p.nama||'—')}</div>
        <div class="card-kk">${kkTxt}</div>
        ${p.kelurahan ? `<div class="card-kel">📍 ${esc(p.kelurahan)}</div>` : ''}
        <div class="card-status">${badge}</div>
      </div>`;
  }).join('');

  prevIds = new Set(list.map(p => String(p.noKK)));
}

// ══════════════════════════════════════════════
//  REFRESH DATA
// ══════════════════════════════════════════════
async function refresh(){
  try{
    const [sR, stR, pR] = await Promise.all([
      gasGet('getPublicSettings'),
      gasGet('getStatistik'),
      gasGet('getPemenangPublik'),
    ]);

    const s    = sR.data || {};
    const showKK = s.show_kk_publik !== 'tidak';

    // Header
    document.getElementById('hdr-title').textContent   = (s.nama_acara || 'DOORPRIZE').toUpperCase();
    document.getElementById('hdr-panitia').textContent = s.nama_panitia   || '';
    document.getElementById('hdr-tema').textContent    = s.tema           || '';
    document.getElementById('hdr-org').textContent     = s.nama_organisasi|| '';
    document.getElementById('hdr-lokasi').textContent  = s.lokasi         || '';
    document.title = (s.nama_acara || 'Doorprize') + ' — Display';

    // Ticker
    if(s.ticker_text){
      document.getElementById('ticker').textContent =
        s.ticker_text.split('|').map(t => '★ ' + t.trim()).join('   ');
    }

    // Footer
    if(s.tema) document.getElementById('footer-text').textContent = s.tema;

    // Stats
    if(stR.success){
      document.getElementById('st-total').textContent  = stR.totalPeserta;
      document.getElementById('st-sisa').textContent   = stR.sisaPool;
      document.getElementById('st-menang').textContent = stR.totalMenang;
      document.getElementById('st-hadir').textContent  = stR.hadir;
    }

    // Grid
    const list = (pR.data||[]).filter(p => p.konfirmasi !== 'Tidak Hadir');
    renderGrid(list, showKK);

  } catch(e){
    console.warn('Refresh error:', e);
  }
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
window.onload = async () => {
  if(GAS_URL === 'GANTI_DENGAN_URL_DEPLOY_APPS_SCRIPT_ANDA'){
    document.getElementById('loading').innerHTML = `
      <div style="text-align:center;padding:32px;font-family:'Montserrat',sans-serif;color:#fff">
        <div style="font-size:3rem;margin-bottom:16px">⚙️</div>
        <h2 style="color:#00c6ff;margin-bottom:12px">Konfigurasi Diperlukan</h2>
        <p style="color:rgba(255,255,255,.65);max-width:380px;line-height:1.7">
          Buka file <code style="color:#FFD700">PublicDisplay.html</code> dan ganti nilai
          <code style="color:#FFD700">GAS_URL</code> dengan URL deploy Google Apps Script Anda.
        </p>
      </div>`;
    return;
  }

  await refresh();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display     = 'flex';
  setInterval(refresh, CFG.refreshMs);
};
</script>
</body>
</html>
